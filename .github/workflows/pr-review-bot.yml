name: PR Review Bot

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: read

jobs:
  pr-review:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout pull request code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run PR review bot sample check
        run: |
          python - <<'PY'
          from pr_review_bot.runner import PRReviewRunner, format_findings

          changed_files = [
              "app/main.py",
          ]

          file_contents = {
              "app/main.py": 'api_key = "sample-value-used-for-review-test"',
          }

          runner = PRReviewRunner()
          findings = runner.review(
              changed_files=changed_files,
              file_contents=file_contents,
          )

          print("PR Review Bot Results")
          print("=====================")

          if findings:
              print(format_findings(findings))
          else:
              print("No review findings detected.")
          PY
