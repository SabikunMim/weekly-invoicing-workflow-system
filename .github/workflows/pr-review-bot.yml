name: PR Review Bot

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled]

permissions:
  contents: write
  pull-requests: write

jobs:
  pr-review:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout pull request branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run test suite
        id: tests
        continue-on-error: true
        env:
          PYTHONPATH: .
        run: pytest

      - name: Review actual pull request changes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PYTHONPATH: .
        run: |
          python -m pr_review_bot.github_pr \
            --event-path "$GITHUB_EVENT_PATH" \
            --output pr-review.md \
            --changed-files-output changed-files.txt

      - name: Post or update PR review comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");
            const marker = "<!-- pr-review-bot -->";
            const body = fs.readFileSync("pr-review.md", "utf8");
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const comments = await github.paginate(
              github.rest.issues.listComments,
              { owner, repo, issue_number, per_page: 100 }
            );
            const existing = comments.find(
              comment => comment.user.type === "Bot" && comment.body.includes(marker)
            );
            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }

      - name: Install safe auto-fix tool
        if: >-
          github.event.pull_request.head.repo.full_name == github.repository &&
          contains(github.event.pull_request.labels.*.name, 'safe-autofix')
        run: pip install ruff

      - name: Attempt human-approved safe auto-fix
        if: >-
          github.event.pull_request.head.repo.full_name == github.repository &&
          contains(github.event.pull_request.labels.*.name, 'safe-autofix')
        env:
          PYTHONPATH: .
        shell: bash
        run: |
          mapfile -t python_files < <(grep -E '\\.py$' changed-files.txt || true)
          if [ "${#python_files[@]}" -eq 0 ]; then
            echo "No changed Python files are eligible for safe auto-fix."
            exit 0
          fi

          ruff check --fix -- "${python_files[@]}"
          ruff format -- "${python_files[@]}"
          pytest

          if git diff --quiet; then
            echo "Safe auto-fix produced no changes."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -- "${python_files[@]}"
          git commit -m "Apply human-approved safe auto-fixes"
          git push origin "HEAD:${{ github.event.pull_request.head.ref }}"
